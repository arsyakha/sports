<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

/* 🔝 BANNER */
.top-banner {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #111;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENT */
.container {
    padding-top: 80px;
}

/* 🔴 LIVE BADGE */
.live-badge {
    display: inline-block;
    background: red;
    padding: 8px 15px;
    border-radius: 5px;
    font-weight: bold;
    margin-bottom: 15px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0.5;}
    100% {opacity: 1;}
}

/* 🖼️ IMAGE */
.hero-img {
    width: 90%;
    max-width: 600px;
    border-radius: 10px;
    margin: 20px auto;
    display: block;
}

/* 🎯 CTA BUTTON */
.cta-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(45deg, #ff0000, #ff6600);
    border-radius: 8px;
    text-decoration: none;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.08);}
    100% {transform: scale(1);}
}

/* TEXT */
.desc {
    margin: 15px;
    font-size: 16px;
    color: #ccc;
}

/* 🔥 FULL CLICK AREA */
.click-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
</style>
