<title>Live Stream</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: Arial, sans-serif;
}

/* Banner */
.top-banner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: #111;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Wrapper paksa center */
.ads-wrapper {
    width: 320px;
    height: 50px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* PAKSA iframe iklan ke tengah */
.ads-wrapper iframe {
    display: block !important;
    margin: 0 auto !important;
    position: relative !important;
    left: 0 !important;
    right: 0 !important;
}

/* Iframe utama */
.iframe-container {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
}

iframe.main-frame {
    width: 100%;
    height: 100%;
    border: none;
}
</style>

</head>

<!-- BANNER -->
<div class="top-banner">
    <div class="ads-wrapper" id="ad-container"></div>
</div>

<!-- IFRAME -->
