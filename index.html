<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;

    /* 🔥 BACKGROUND KEREN */
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* 🔝 BANNER */
.top-banner {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENT */
.container {
    padding-top: 90px;
}

/* 🔴 LIVE BADGE */
.live-badge {
    display: inline-block;
    background: red;
    padding: 8px 18px;
    border-radius: 30px;
    font-weight: bold;
    margin-bottom: 15px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0.5;}
    100% {opacity: 1;}
}

/* TITLE */
h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

/* PLAYER BOX */
.player-box {
    position: relative;
    width: 90%;
    max-width: 650px;
    margin: 20px auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(255,0,0,0.6);
}

.player-box img {
    width: 100%;
}

/* PLAY BUTTON */
.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 20px 28px;
    border-radius: 50%;
    transition: 0.2s;
}

.player-box:hover .play-btn {
    transform: translate(-50%, -50%) scale(1.1);
}

/* TEXT */
.desc {
    margin: 15px;
    font-size: 16px;
    color: #ddd;
}

/* 🔥 CTA */
.cta-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 16px 30px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(45deg, #ff0000, #ff9900);
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 0 20px rgba(255,0,0,0.8);
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.07);}
    100% {transform: scale(1);}
}
</style>
